<!DOCTYPE html>
<html>
<head>
<title>HealthiBite Result</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="main">
    
    <div class="header">
        <p class="subtitle">Plan your health with AI precision</p>

        <div class="badge-wrapper">
            <div class="badge">✨ Gen AI Powered</div>
        </div>
    </div>

    <div class="result-page">

    <div class="result-card">
        <h2>🥗 Diet</h2>
        <div id="diet"></div>
    </div>

    <div class="result-card">
        <h2>🏃 Exercise</h2>
        <div id="exercise"></div>
    </div>

    <div class="result-card">
        <h2>😴 Sleep</h2>
        <div id="sleep"></div>
    </div>

</div>

    <div class="back-btn">
        <a href="/">← Back</a>
    </div>

</div>
<script>
    let data = {{ result | tojson }};

    let diet = document.getElementById("diet");
    let exercise = document.getElementById("exercise");
    let sleep = document.getElementById("sleep");

    function format(items) {
        return items.map(item => `<li>${item}</li>`).join("");
    }

    if (!data) {
        diet.innerHTML = "<p>⚠️ Unable to generate response.</p>";
        exercise.innerHTML = "<p>⚠️ Please try again.</p>";
        sleep.innerHTML = "<p>⚠️ Something went wrong.</p>";
    } else {
        diet.innerHTML = `<ul>${format(data.diet)}</ul>`;
        exercise.innerHTML = `<ul>${format(data.exercise)}</ul>`;
        sleep.innerHTML = `<ul>${format(data.sleep)}</ul>`;
    }
</script>
</body>
</html>
