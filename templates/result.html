<!DOCTYPE html>
<html>
<head>
<title>HealthiBite Result</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="main">
    
    <div class="header">
        <p class="subtitle">Plan your health with AI precision</p>

        <div class="badge-wrapper">
            <div class="badge">✨ Gen AI Powered</div>
        </div>
    </div>

    <div class="result-page">

    <div class="result-card">
        <h2>🥗 Diet</h2>
        <div id="diet"></div>
    </div>

    <div class="result-card">
        <h2>🏃 Exercise</h2>
        <div id="exercise"></div>
    </div>

    <div class="result-card">
        <h2>😴 Sleep</h2>
        <div id="sleep"></div>
    </div>

</div>

    <div class="back-btn">
        <a href="/">← Back</a>
    </div>

</div>
<script>
let text = `{{ result|safe }}`;

// Handle AI busy
if (text === "AI_BUSY") {
    diet.innerHTML = "<p>⚠️ AI is currently busy. Please try again shortly.</p>";
    exercise.innerHTML = "<p>⚠️ Service temporarily unavailable.</p>";
    sleep.innerHTML = "<p>⚠️ Please retry in a few moments.</p>";
}
else {
    try {
        let data = JSON.parse(text);

        function format(items) {
            return items.map(item => `<li>${item}</li>`).join("");
        }

        diet.innerHTML = `<ul>${format(data.diet)}</ul>`;
        exercise.innerHTML = `<ul>${format(data.exercise)}</ul>`;
        sleep.innerHTML = `<ul>${format(data.sleep)}</ul>`;

    } catch (error) {
        diet.innerHTML = "<p>⚠️ Failed to parse AI response.</p>";
        exercise.innerHTML = "<p>⚠️ Formatting error.</p>";
        sleep.innerHTML = "<p>⚠️ Please try again.</p>";
    }
}
</script>
</body>
</html>
