<!DOCTYPE html>
<html>
<head>
<title>HealthiBite Result</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="main">
    
    <div class="header">
        <p class="subtitle">Plan your health with AI precision</p>

        <div class="badge-wrapper">
            <div class="badge">✨ Gen AI Powered</div>
        </div>
    </div>

    <div class="result-page">

    <div class="result-card">
        <h2>🥗 Diet</h2>
        <div id="diet"></div>
    </div>

    <div class="result-card">
        <h2>🏃 Exercise</h2>
        <div id="exercise"></div>
    </div>

    <div class="result-card">
        <h2>😴 Sleep</h2>
        <div id="sleep"></div>
    </div>

</div>

    <div class="back-btn">
        <a href="/">← Back</a>
    </div>

</div>

<script>
let text = `{{ result }}`;

// 🔥 HANDLE AI BUSY (MOST IMPORTANT)
if (text === "AI_BUSY") {
    diet.innerHTML = "<p>⚠️ AI is currently busy. Please try again shortly.</p>";
    exercise.innerHTML = "<p>⚠️ Service temporarily unavailable.</p>";
    sleep.innerHTML = "<p>⚠️ Please retry in a few moments.</p>";
}

// 🚨 OTHER ERRORS
else if (text === "QUOTA_ERROR") {
    diet.innerText = "⚠️ AI limit reached. Try later.";
    exercise.innerText = "⚠️ Please wait.";
    sleep.innerText = "⚠️ Service unavailable.";
}
else if (text === "ERROR") {
    diet.innerText = "⚠️ Something went wrong.";
    exercise.innerText = "⚠️ Try again.";
    sleep.innerText = "⚠️ Error occurred.";
}

// ✅ NORMAL FLOW
else {

    // 🔥 CLEAN TEXT
    text = text
        .replace(/\*\*/g, "")
        .replace(/\*/g, "");

    // 🔥 SPLIT SECTIONS
    function getSection(start, end) {
        const startIndex = text.toLowerCase().indexOf(start);
        if (startIndex === -1) return "";

        const endIndex = end 
            ? text.toLowerCase().indexOf(end, startIndex)
            : text.length;

        return text.substring(startIndex + start.length, endIndex).trim();
    }

    let dietText = getSection("diet", "exercise");
    let exerciseText = getSection("exercise", "sleep");
    let sleepText = getSection("sleep", null);

    // 🔥 FORMAT BULLETS
    function format(content) {
        return content
            .split("\n")
            .map(line => line.trim())
            .filter(line => 
                line !== "" &&
                line !== ":" &&
                line !== "-" &&
                line !== "." &&
                line.length > 2
            )
            .map(line => line.replace(/^[-•:]/, "").trim())
            .filter(line => line !== "")
            .map(line => `<li>${line}</li>`)
            .join("");
    }

    diet.innerHTML = `<ul>${format(dietText)}</ul>`;
    exercise.innerHTML = `<ul>${format(exerciseText)}</ul>`;
    sleep.innerHTML = `<ul>${format(sleepText)}</ul>`;
}
</script>
</body>
</html>
