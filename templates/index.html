<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HealthiBite</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>

</head>
<body>

<div class="main">

    <!-- HEADER -->
    <div class="header">
        <h1>HealthiBite 🥗</h1>

        <div class="badge-wrapper">
            <div class="badge">
                ✨ Gen AI Powered
            </div>
        </div>
    </div>

    <!-- FORM CONTAINER -->
    <div class="app-container">

        <div class="form-section glass">

            <h2>Tell us about you</h2>

            <!-- ✅ CORRECT FORM -->
            <form method="POST" action="/result">

                <input type="text" name="age" placeholder="Age" required>

                <select id="goal" name="goal">
    <option value="">Select your goal</option>
    <option>weight management</option>
    <option>improve energy</option>
    <option>better sleep</option>
    <option>general fitness</option>
</select>

<select id="activity" name="activity">
    <option value="">Select Activity level</option>
    <option>low</option>
    <option>medium</option>
    <option>high</option>
</select>

                <textarea name="query" placeholder="Describe your issue..." required></textarea>

                <button type="submit">🚀 Generate Plan</button>

                <div class="history-btn">
    <a href="/history">📊 View History</a>
</div>

            </form>

        </div>

    </div>

</div>
<div id="loader" class="loader hidden">
    <div class="spinner"></div>
    <p>Generating your AI plan...</p>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    new Choices("#goal", {
        searchEnabled: false,
        itemSelectText: ""
    });

    new Choices("#activity", {
        searchEnabled: false,
        itemSelectText: ""
    });
});

document.querySelector("form").addEventListener("submit", function() {
    document.getElementById("loader").classList.remove("hidden");


});
</script>

</body>
</html>
